# Client app in /client — build must run there so Vite copies public/_redirects → dist/_redirects
# Set VITE_API_URL in Netlify → Environment variables (build) to your backend HTTPS origin, then redeploy.
[build]
  base = "client"
  command = "npm ci && npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
