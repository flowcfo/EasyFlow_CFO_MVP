# Client app in /client — build must run there so Vite copies public/_redirects → dist/_redirects
[build]
  base = "client"
  command = "npm ci && npm run build"
  publish = "dist"

# Same-origin API: browser calls /backend/* → Netlify proxies to Railway (avoids CORS / env mistakes).
[build.environment]
  VITE_API_URL = "/backend"

# Proxy must be listed BEFORE the SPA catch-all.
[[redirects]]
  from = "/backend/*"
  to = "https://easyflowcfomvp-production.up.railway.app/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
