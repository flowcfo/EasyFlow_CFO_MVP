# Client app in /client — build must run there so Vite copies public/_redirects → dist/_redirects
[build]
  base = "client"
  command = "npm ci && npm run build"
  publish = "dist"

# Same-origin API: browser calls /backend/* → Netlify proxies to Railway (avoids CORS / env mistakes).
[build.environment]
  VITE_API_URL = "/backend"

# Redirects live in client/public/_redirects (copied to dist) so publish dir has one ordered list.
